# 3-GPU DDP (GPUs visible via CUDA_VISIBLE_DEVICES=1,2,3). bf16, no offload.
# num_processes here is overridden by --num_processes in scripts/launch_*.sh.
compute_environment: LOCAL_MACHINE
debug: false
distributed_type: MULTI_GPU
downcast_bf16: 'no'
enable_cpu_affinity: false
gpu_ids: all
machine_rank: 0
main_training_function: main
mixed_precision: bf16
num_machines: 1
num_processes: 3
rdzv_backend: static
same_network: true
tpu_use_cluster: false
tpu_use_sudo: false
use_cpu: false
